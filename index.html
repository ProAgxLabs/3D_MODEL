<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabina de Pintura Industrial — Modelo 3D</title>
<style>
  :root{
    --naranja:#F07818;
    --tinta:#2A3138;
    --panel:rgba(255,255,255,.86);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif}
  body{background:linear-gradient(180deg,#F2F3F5 0%,#E2E5E9 55%,#CDD2D8 100%)}
  #escena{position:fixed;inset:0;touch-action:none;cursor:grab}
  #escena.arrastrando{cursor:grabbing}

  .titulo{
    position:fixed;top:18px;left:22px;z-index:5;pointer-events:none;
  }
  .titulo .eyebrow{
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--naranja);font-weight:700;
  }
  .titulo h1{
    font-size:clamp(17px,2.4vw,24px);color:var(--tinta);font-weight:600;letter-spacing:-.01em;
  }
  .titulo .sub{font-size:12px;color:#6B7480;margin-top:2px}

  .barra{
    position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:5;
    display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
    background:var(--panel);backdrop-filter:blur(8px);
    padding:10px 12px;border-radius:14px;
    box-shadow:0 8px 28px rgba(30,40,50,.18);
    max-width:calc(100vw - 24px);
  }
  .barra button{
    border:1px solid #D4D9DE;background:#fff;color:var(--tinta);
    font:600 12.5px/1 "Segoe UI",system-ui,sans-serif;
    padding:9px 14px;border-radius:9px;cursor:pointer;
    transition:background .15s,border-color .15s,color .15s;
  }
  .barra button:hover{border-color:var(--naranja);color:var(--naranja)}
  .barra button:focus-visible{outline:2px solid var(--naranja);outline-offset:2px}
  .barra button.activo{background:var(--naranja);border-color:var(--naranja);color:#fff}

  .ayuda{
    position:fixed;right:18px;top:18px;z-index:5;
    background:var(--panel);backdrop-filter:blur(8px);
    border-radius:12px;padding:10px 14px;font-size:11.5px;color:#59626C;
    box-shadow:0 6px 20px rgba(30,40,50,.14);line-height:1.55;
  }
  .ayuda b{color:var(--tinta)}
  @media (max-width:640px){ .ayuda{display:none} }

  /* logo discreto de la empresa + crédito, integrados al bloque de título
     (evita solaparse con la barra de vistas al ser responsiva) */
  .marca{display:flex;align-items:center;gap:8px;margin-top:10px}
  .marca img{
    display:block;height:20px;width:auto;max-width:100px;object-fit:contain;
    border-radius:3px;
  }
  .marca .credito{font-size:10px;color:#9AA2AA;letter-spacing:.02em}
  @media (max-width:640px){
    .marca{margin-top:8px}
    .marca img{height:16px}
    .marca .credito{font-size:9px}
  }
</style>
</head>
<body>

  <button data-vista="cenital">Cenital</button>
  <button id="btnGiro">▶ Rotación auto</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";

/* ============ renderer / escena ============ */
const canvas = document.getElementById('escena');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const escena = new THREE.Scene();

const camara = new THREE.PerspectiveCamera(38, 1, 0.1, 200);

/* ============ luces ============ */
const hemi = new THREE.HemisphereLight(0xE8F0FF, 0xC9A99B, 0.85);
escena.add(hemi);

const sol = new THREE.DirectionalLight(0xFFF4E8, 1.35);
sol.position.set(-4, 12, 7);
sol.castShadow = true;
sol.shadow.mapSize.set(2048, 2048);
sol.shadow.camera.left = -9;  sol.shadow.camera.right  = 9;
sol.shadow.camera.top  = 9;   sol.shadow.camera.bottom = -9;
sol.shadow.camera.near = 1;   sol.shadow.camera.far    = 40;
sol.shadow.bias = -0.0006;
escena.add(sol);

const relleno = new THREE.DirectionalLight(0xDDE8FF, 0.45);
relleno.position.set(8, 5, -9);
escena.add(relleno);

/* ============ materiales ============ */
const M = {
  naranja: new THREE.MeshStandardMaterial({color:0xEE7514, roughness:0.42, metalness:0.15}),
  lamina:  new THREE.MeshStandardMaterial({color:0xB4BBC2, roughness:0.38, metalness:0.75, side:THREE.DoubleSide}),
  laminaOsc: new THREE.MeshStandardMaterial({color:0x79828C, roughness:0.42, metalness:0.72, side:THREE.DoubleSide}),
  laminaInt: new THREE.MeshStandardMaterial({color:0x9AA2AA, roughness:0.45, metalness:0.65, side:THREE.DoubleSide}),
  deflector: new THREE.MeshStandardMaterial({color:0x6E7780, roughness:0.5, metalness:0.6, side:THREE.DoubleSide}),
  crema:   new THREE.MeshStandardMaterial({color:0xFAFAF6, roughness:0.7, metalness:0.05}),
  ducto:   new THREE.MeshStandardMaterial({color:0xB4BBC2, roughness:0.3, metalness:0.85}),
  ductoOsc:new THREE.MeshStandardMaterial({color:0x79828C, roughness:0.35, metalness:0.8}),
  rejilla: new THREE.MeshStandardMaterial({color:0x343B42, roughness:0.6, metalness:0.4}),
};

/* textura de panel perforado (dibujada en canvas) */
function texturaPerforada(){
  const c = document.createElement('canvas');
  c.width = 1024; c.height = 256;
  const g = c.getContext('2d');
  g.fillStyle = '#F4F4F0'; g.fillRect(0,0,c.width,c.height);
  g.fillStyle = '#878E96';
  const paso = 28;
  for(let y = paso/2; y < c.height; y += paso){
    for(let x = paso/2; x < c.width; x += paso){
      g.beginPath(); g.arc(x, y, 4.2, 0, Math.PI*2); g.fill();
    }
  }
  const t = new THREE.CanvasTexture(c);
  t.anisotropy = 8;
  return t;
}
M.perforado = new THREE.MeshStandardMaterial({
  map: texturaPerforada(), roughness:0.65, metalness:0.1, side:THREE.DoubleSide
});

/* ============ modelo (coordenadas z-arriba, luego se rota el grupo) ============ */
const modelo = new THREE.Group();

function caja(x,y,z, dx,dy,dz, mat){
  const m = new THREE.Mesh(new THREE.BoxGeometry(dx,dy,dz), mat);
  m.position.set(x+dx/2, y+dy/2, z+dz/2);
  m.castShadow = true; m.receiveShadow = true;
  modelo.add(m);
  return m;
}
/* cilindro a lo largo del eje z local */
function cilZ(x,y,z0,z1, r, mat, seg=40){
  const h = z1-z0;
  const m = new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,seg), mat);
  m.rotation.x = Math.PI/2;
  m.position.set(x, y, z0+h/2);
  m.castShadow = true;
  modelo.add(m);
  return m;
}
/* cilindro a lo largo del eje x local */
function cilX(x0,x1,y,z, r, mat, seg=40){
  const L = Math.abs(x1-x0);
  const m = new THREE.Mesh(new THREE.CylinderGeometry(r,r,L,seg), mat);
  m.rotation.z = Math.PI/2;
  m.position.set((x0+x1)/2, y, z);
  m.castShadow = true;
  modelo.add(m);
  return m;
}
/* cilindro a lo largo del eje y local (eje por defecto del CylinderGeometry, sin rotar) */
function cilY(x, y0,y1, z, r, mat, seg=40){
  const L = Math.abs(y1-y0);
  const m = new THREE.Mesh(new THREE.CylinderGeometry(r,r,L,seg), mat);
  m.position.set(x, (y0+y1)/2, z);
  m.castShadow = true;
  modelo.add(m);
  return m;
}

const W = 4.0, D = 3.0, H = 3.0;

/* cuerpo de lámina */
caja(0, 0, 0, 0.06, D, H, M.lamina);            // pared izquierda
caja(W-0.06, 0, 0, 0.06, D, H, M.lamina);       // pared derecha
for(let i=0;i<4;i++){                            // uniones verticales
  const yr = 0.55 + i*(D-1.0)/3;
  caja(0.06, yr, 0.08, 0.015, 0.04, H-0.35, M.laminaOsc);
  caja(W-0.075, yr, 0.08, 0.015, 0.04, H-0.35, M.laminaOsc);
}
caja(0, 0, H-0.06, W, D, 0.06, M.laminaInt);     // techo

/* deflector inclinado interno */
(function(){
  const largo = Math.hypot(0.9, 0.69);
  const m = new THREE.Mesh(new THREE.PlaneGeometry(W-0.12, largo), M.deflector);
  m.position.set(W/2, 1.35, H-0.405);
  m.rotation.x = Math.atan2(0.69, 0.9);
  m.castShadow = true; m.receiveShadow = true;
  modelo.add(m);
})();

/* pared trasera: banda lisa + perforado en 2 filas + travesaño + zoclo */
caja(0.06, D-0.10, 2.12, W-0.12, 0.06, 0.88, M.crema);
(function(){
  const filas = [[1.32, 0.80], [0.42, 0.80]];
  for(const [z0, hf] of filas){
    const m = new THREE.Mesh(new THREE.BoxGeometry(W-0.12, 0.06, hf), M.perforado);
    m.position.set(W/2, D-0.07, z0+hf/2);
    m.castShadow = true; m.receiveShadow = true;
    modelo.add(m);
  }
})();
caja(0.06, D-0.12, 1.20, W-0.12, 0.055, 0.12, M.lamina);
caja(0.06, D-0.10, 0.0, W-0.12, 0.06, 0.42, M.lamina);

/* estructura naranja (abraza el cuerpo) */
[
  [-0.12,-0.12,0,        0.20,0.24,H],
  [W-0.08,-0.12,0,       0.20,0.24,H],
  [-0.12,-0.12,H-0.34,   W+0.24,0.24,0.49],
  [-0.12,0,H,            0.18,D+0.12,0.15],
  [W-0.06,0,H,           0.18,D+0.12,0.15],
  [-0.12,D-0.08,H,       W+0.24,0.20,0.15],
  [-0.12,D-0.08,0,       0.18,0.20,H],
  [W-0.06,D-0.08,0,      0.18,0.20,H],
].forEach(a=>caja(a[0],a[1],a[2],a[3],a[4],a[5],M.naranja));

/* plenum trasero */
caja(0.35, D+0.12, 0.45, W-0.7, 0.55, H-0.6, M.lamina);
caja(0.33, D+0.12, 1.35, W-0.66, 0.57, 0.05, M.laminaOsc);
caja(0.33, D+0.12, 2.15, W-0.66, 0.57, 0.05, M.laminaOsc);

/* ductos + extractores
   Los 3 tubos son individuales (cada uno con su propia posición a lo
   ancho de la cabina) pero del mismo tamaño exacto: se usa la altura
   del tubo más alto de la referencia para los 3. Cada uno sale de la
   parte posterior de la cabina, sube una distancia considerable y
   recién ahí el codo lo dobla para avanzar horizontalmente hacia el
   frente de la cabina (no hacia el costado), de modo que el cabezal
   del extractor queda mirando de frente, igual que la cabina. */
const ductoR = 0.14, fanR = 0.225;
const xsD = [0.85, 2.0, 3.15];        // posición individual de cada tubo (ancho de la cabina)
const yC = D + 0.40;                   // profundidad de salida, parte posterior de la cabina
const baseZ = 2.85;                    // altura de salida
const riseLen = 2.00;                  // ascenso considerable (igual para los 3: el más alto)
const topZ = baseZ + riseLen;          // altura del codo / tramo horizontal (misma para los 3)
const runLen = 2.50;                   // largo del tramo horizontal hacia el frente
const yFin = yC - 0.24 - runLen;       // profundidad del extremo (extractor), mirando al frente

/* matriz que mapea los ejes locales del codo (torus, plano X-Y) hacia
   el plano vertical->frente (Z->Y): eje local X -> Y, eje local Y -> Z,
   eje local Z -> X. Así el codo entra en Z (subiendo) y sale en -Y
   (hacia el frente), dejando el cabezal orientado hacia el frente. */
const basisCodo = new THREE.Matrix4().makeBasis(
  new THREE.Vector3(0,1,0),
  new THREE.Vector3(0,0,1),
  new THREE.Vector3(1,0,0)
);

for(let k=0;k<3;k++){
  const xd = xsD[k];
  cilZ(xd, yC, baseZ, topZ-0.24, ductoR, M.ducto);                    // vertical
  cilZ(xd, yC, baseZ+0.65, baseZ+0.71, ductoR*1.35, M.ductoOsc);      // brida

  /* codo: cuarto de toro, del tramo vertical (Z) al horizontal hacia el frente (Y) */
  const codo = new THREE.Mesh(
    new THREE.TorusGeometry(0.24, ductoR, 20, 28, Math.PI/2), M.ducto);
  codo.quaternion.setFromRotationMatrix(basisCodo);
  codo.position.set(xd, yC-0.24, topZ-0.24);
  codo.castShadow = true;
  modelo.add(codo);

  cilY(xd, yFin+0.50, yC-0.24, topZ, ductoR, M.ducto);                // horizontal, hacia el frente
  const ym = ((yC-0.24)+yFin)/2;
  cilY(xd, ym-0.06, ym, topZ, ductoR*1.35, M.ductoOsc);               // brida
  cilY(xd, yFin, yFin+0.50, topZ, fanR, M.ductoOsc);                  // extractor
  cilY(xd, yFin-0.04, yFin+0.02, topZ, fanR*1.06, M.naranja, 40);     // aro naranja
  /* rejilla: 4 barras cruzadas en el plano perpendicular al eje del
     tubo (plano X-Z), para que se vean de frente junto al cabezal */
  for(let a=0;a<4;a++){
    const ang = a*Math.PI/4;
    const barra = new THREE.Mesh(
      new THREE.CylinderGeometry(0.011, 0.011, 0.37, 8), M.rejilla);
    barra.position.set(xd, yFin-0.05, topZ);
    barra.quaternion.setFromUnitVectors(
      new THREE.Vector3(0,1,0),
      new THREE.Vector3(Math.cos(ang), 0, Math.sin(ang))
    );
    modelo.add(barra);
  }
}

/* rotar a y-arriba y centrar */
modelo.rotation.x = -Math.PI/2;
const contenedor = new THREE.Group();
contenedor.add(modelo);
/* centro visual aprox del conjunto (x, alto, profundidad) */
modelo.position.set(-0.9, 0, 1.6);   /* local (x,y,z)->mundo (x,z,-y): compensa profundidad */
escena.add(contenedor);

/* piso receptor de sombras (invisible, solo sombra) */
const piso = new THREE.Mesh(
  new THREE.CircleGeometry(14, 48),
  new THREE.ShadowMaterial({opacity:0.22})
);
piso.rotation.x = -Math.PI/2;
piso.position.y = 0;
piso.receiveShadow = true;
escena.add(piso);

/* disco sutil de "estudio" bajo el modelo */
const disco = new THREE.Mesh(
  new THREE.CircleGeometry(8.5, 64),
  new THREE.MeshStandardMaterial({color:0xD8DCE0, roughness:0.95, metalness:0})
);
disco.rotation.x = -Math.PI/2;
disco.position.y = -0.012;
disco.receiveShadow = true;
escena.add(disco);

/* ============ controles de órbita propios ============ */
const objetivo = new THREE.Vector3(1.0, 1.6, 0.05);
let esf = {r: 14.2, theta: Math.PI*0.28, phi: Math.PI*0.42};  // radio, azimut, polar
const LIM = {rMin:4, rMax:40, phiMin:0.08, phiMax:Math.PI/2 - 0.02};

function aplicarCamara(){
  esf.r   = Math.max(LIM.rMin, Math.min(LIM.rMax, esf.r));
  esf.phi = Math.max(LIM.phiMin, Math.min(LIM.phiMax, esf.phi));
  const rEfectivo = Math.min(LIM.rMax, esf.r * factorEncuadre);
  const sp = Math.sin(esf.phi), cp = Math.cos(esf.phi);
  camara.position.set(
    objetivo.x + rEfectivo*sp*Math.cos(esf.theta),
    objetivo.y + rEfectivo*cp,
    objetivo.z + rEfectivo*sp*Math.sin(esf.theta)
  );
  camara.lookAt(objetivo);
}

let arrastre = null;
canvas.addEventListener('pointerdown', e=>{
  canvas.setPointerCapture(e.pointerId);
  canvas.classList.add('arrastrando');
  arrastre = {x:e.clientX, y:e.clientY, boton:e.button};
  detenerAnimVista();
});
canvas.addEventListener('pointermove', e=>{
  if(!arrastre || pinch) return;
  const dx = e.clientX - arrastre.x, dy = e.clientY - arrastre.y;
  arrastre.x = e.clientX; arrastre.y = e.clientY;
  if(arrastre.boton === 2){           /* pan */
    const esc = esf.r * 0.0011;
    const dir = new THREE.Vector3().subVectors(camara.position, objetivo);
    const derecha = new THREE.Vector3().crossVectors(camara.up, dir).normalize();
    const arriba  = new THREE.Vector3().crossVectors(dir, derecha).normalize();
    objetivo.addScaledVector(derecha, dx*esc);
    objetivo.addScaledVector(arriba, -dy*esc);
  }else{                              /* rotación */
    esf.theta += dx*0.0058;
    esf.phi   -= dy*0.0052;
    autoGiro = false; actualizarBtnGiro();
  }
  aplicarCamara();
});
const soltar = e=>{ arrastre=null; canvas.classList.remove('arrastrando'); };
canvas.addEventListener('pointerup', soltar);
canvas.addEventListener('pointercancel', soltar);
canvas.addEventListener('contextmenu', e=>e.preventDefault());
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  esf.r *= (e.deltaY > 0 ? 1.09 : 0.92);
  aplicarCamara();
  detenerAnimVista();
}, {passive:false});

/* pellizco táctil */
let pinch = null;
canvas.addEventListener('touchstart', e=>{
  if(e.touches.length===2){
    pinch = Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                       e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:true});
canvas.addEventListener('touchmove', e=>{
  if(e.touches.length===2 && pinch){
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                         e.touches[0].clientY-e.touches[1].clientY);
    esf.r *= pinch/d;
    pinch = d;
    aplicarCamara();
  }
},{passive:true});
canvas.addEventListener('touchend', ()=>{ pinch=null; });

/* ============ vistas predefinidas ============ */
const VISTAS = {
  iso:     {r:14.2, theta: Math.PI*0.28,  phi: Math.PI*0.42, obj:[1.0,1.6,0.05]},
  frontal: {r:14.7, theta: Math.PI*0.50,  phi: Math.PI*0.47, obj:[1.0,1.7,0.05]},
  lateral: {r:14.2, theta: Math.PI*0.82,  phi: Math.PI*0.44, obj:[1.0,1.7,0.05]},
  trasera: {r:14.7, theta:-Math.PI*0.38,  phi: Math.PI*0.42, obj:[1.0,1.6,0.05]},
  cenital: {r:15.5, theta: Math.PI*0.25,  phi: 0.20,          obj:[1.0,1.0,0.05]},
};
let animVista = null;
function irAVista(nombre){
  const v = VISTAS[nombre];
  if(!v) return;
  /* tomar el camino angular más corto */
  let thDest = v.theta;
  while(thDest - esf.theta >  Math.PI) thDest -= 2*Math.PI;
  while(thDest - esf.theta < -Math.PI) thDest += 2*Math.PI;
  const ini = {r:esf.r, theta:esf.theta, phi:esf.phi,
               ox:objetivo.x, oy:objetivo.y, oz:objetivo.z};
  const fin = {r:v.r, theta:thDest, phi:v.phi, ox:v.obj[0], oy:v.obj[1], oz:v.obj[2]};
  const t0 = performance.now(), dur = 850;
  const suav = t => t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
  cancelAnimationFrame(animVista);
  (function paso(){
    const t = Math.min(1, (performance.now()-t0)/dur), s = suav(t);
    esf.r     = ini.r     + (fin.r-ini.r)*s;
    esf.theta = ini.theta + (fin.theta-ini.theta)*s;
    esf.phi   = ini.phi   + (fin.phi-ini.phi)*s;
    objetivo.set(ini.ox+(fin.ox-ini.ox)*s, ini.oy+(fin.oy-ini.oy)*s, ini.oz+(fin.oz-ini.oz)*s);
    aplicarCamara();
    if(t<1) animVista = requestAnimationFrame(paso);
  })();
}
function detenerAnimVista(){ cancelAnimationFrame(animVista); }

document.querySelectorAll('.barra button[data-vista]').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.barra button[data-vista]')
      .forEach(x=>x.classList.remove('activo'));
    b.classList.add('activo');
    autoGiro = false; actualizarBtnGiro();
    irAVista(b.dataset.vista);
  });
});

/* rotación automática */
let autoGiro = false;
const btnGiro = document.getElementById('btnGiro');
const movReducido = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function actualizarBtnGiro(){
  btnGiro.textContent = autoGiro ? '⏸ Detener giro' : '▶ Rotación auto';
  btnGiro.classList.toggle('activo', autoGiro);
}
btnGiro.addEventListener('click', ()=>{
  autoGiro = !autoGiro;
  actualizarBtnGiro();
});

/* ============ bucle ============ */
const FOV_BASE      = 38;    // FOV vertical de diseño (cámara no se distorsiona, se mantiene fijo)
const ASPECTO_BASE  = 16/9;  // aspecto de referencia (pantallas horizontales, como se diseñó)
const RADIO_ENCUADRE = 3.0;  // "radio" aprox. de la cabina que siempre debe verse completa

const _vFovRad = THREE.MathUtils.degToRad(FOV_BASE);
const _distVertical = RADIO_ENCUADRE / Math.sin(_vFovRad/2); // no depende del aspecto
const _hFovRadBase  = 2*Math.atan(Math.tan(_vFovRad/2)*ASPECTO_BASE);
const _distBase = Math.max(_distVertical, RADIO_ENCUADRE / Math.sin(_hFovRadBase/2));

let factorEncuadre = 1; // >=1: cuánto hay que alejar la cámara extra para pantallas angostas

function ajustar(){
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  const aspecto = w / h;
  camara.aspect = aspecto;
  camara.fov = FOV_BASE;
  camara.updateProjectionMatrix();

  /* En pantallas más angostas que el diseño original (celulares en vertical,
     principalmente) la cabina deja de entrar completa en el ancho visible.
     Aquí se calcula cuánto hay que alejar la cámara para que siga entrando
     completa y centrada, sin distorsionar el FOV. En pantallas iguales o
     más anchas que el diseño (factor = 1) no se altera nada. */
  const hFovRad = 2*Math.atan(Math.tan(_vFovRad/2)*aspecto);
  const distHorizontal = RADIO_ENCUADRE / Math.sin(hFovRad/2);
  const distNecesaria = Math.max(_distVertical, distHorizontal);
  factorEncuadre = distNecesaria / _distBase;

  aplicarCamara();
}
window.addEventListener('resize', ajustar);
ajustar();
aplicarCamara();

let tPrev = performance.now();
(function bucle(t){
  requestAnimationFrame(bucle);
  const dt = Math.min(0.05, (t-tPrev)/1000); tPrev = t;
  if(autoGiro && !movReducido){
    esf.theta += dt*0.35;
    aplicarCamara();
  }
  renderer.render(escena, camara);
})(tPrev);

})();
</script>
</body>
</html>
